name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o g.zip
          unzip -q g.zip -d $HOME/gradle
          export PATH=$HOME/gradle/gradle-8.4/bin:$PATH
          ANDROID_SDK=$HOME/android-sdk
          mkdir -p $ANDROID_SDK/cmdline-tools
          curl -s https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o ct.zip
          unzip -q ct.zip -d $ANDROID_SDK/cmdline-tools
          mv $ANDROID_SDK/cmdline-tools/cmdline-tools $ANDROID_SDK/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$ANDROID_SDK
          export ANDROID_HOME=$ANDROID_SDK
          yes | $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
          mkdir -p app/src/main/res/values app/src/main/res/mipmap-hdpi
          echo 'rootProject.name="SigmaFirst"
          include ":app"' > settings.gradle
          echo 'buildscript{repositories{google();mavenCentral()}
          dependencies{classpath "com.android.tools.build:gradle:8.2.2"}}
          allprojects{repositories{google();mavenCentral()}}' > build.gradle
          echo 'android.useAndroidX=true
          android.enableJetifier=true' > gradle.properties
          echo 'plugins{id "com.android.application"}
          android{namespace "app.sigmafirst.twa";compileSdk 34
          defaultConfig{applicationId "app.sigmafirst.twa";minSdk 21;targetSdk 34;versionCode 1;versionName "1.0.0"}
          compileOptions{sourceCompatibility JavaVersion.VERSION_17;targetCompatibility JavaVersion.VERSION_17}}
          dependencies{implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"}' > app/build.gradle
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.INTERNET"/>
          <application android:label="Sigma First" android:theme="@style/Theme.App">
          <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:exported="true">
          <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://agent-69c4f1c2384b5d3--glittering-kitsune-1a77e6.netlify.app"/>
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity>
          <service android:name="com.google.androidbrowserhelper.trusted.DelegationService" android:exported="true" android:enabled="true">
          <intent-filter><action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/><category android:name="android.intent.category.DEFAULT"/></intent-filter>
          </service>
          </application>
          </manifest>
          EOF
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="android:Theme.NoTitleBar.Fullscreen"/></resources>' > app/src/main/res/values/themes.xml
          python3 -c "
          import struct,zlib
          def png(s):
            def c(t,d):
              x=t+d
              return struct.pack('>I',len(d))+x+struct.pack('>I',zlib.crc32(x)&0xffffffff)
            r=b''.join(b'\x00'+bytes([30,80,40]*s) for _ in range(s))
            return b'\x89PNG\r\n\x1a\n'+c(b'IHDR',struct.pack('>IIBBBBB',s,s,8,2,0,0,0))+c(b'IDAT',zlib.compress(r))+c(b'IEND',b'')
          open('app/src/main/res/mipmap-hdpi/ic_launcher.png','wb').write(png(72))
          "
          gradle assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: sigma-first-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
