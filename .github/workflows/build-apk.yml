name: Build APK from PWA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create TWA config
        run: |
          mkdir -p ./twa-app
          cat > ./twa-app/twa-manifest.json << 'EOF'
          {
            "packageId": "app.netlify.sigmafirst",
            "host": "agent-69c4f1c2384b5d3--glittering-kitsune-1a77e6.netlify.app",
            "name": "Sigma First",
            "launcherName": "Sigma First",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://agent-69c4f1c2384b5d3--glittering-kitsune-1a77e6.netlify.app/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./android.keystore",
              "alias": "sigmafirst"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://agent-69c4f1c2384b5d3--glittering-kitsune-1a77e6.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": []
          }
          EOF

      - name: Build APK
        working-directory: ./twa-app
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sigma-first-apk
          path: |
            ./twa-app/*.apk
            ./twa-app/*.aab
          retention-days: 7
