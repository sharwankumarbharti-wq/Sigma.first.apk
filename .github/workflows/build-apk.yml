name: Build APK from PWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: printf "n\n/usr/lib/jvm/temurin-17-amd64\n" | bubblewrap init --manifest=https://agent-69c4f1c2384b5d3--glittering-kitsune-1a77e6.netlify.app/manifest.json --directory=./twa-app
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'

      - name: Build APK
        working-directory: ./twa-app
        run: bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sigma-first-apk
          path: |
            ./twa-app/*.apk
            ./twa-app/*.aab
          retention-days: 7
