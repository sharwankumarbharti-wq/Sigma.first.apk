name: Build APK from PWA

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          bubblewrap init \
            --manifest=https://agent-69c4f1c2384b5d3--glittering-kitsune-1a77e6.netlify.app/manifest.json \
            --directory=./twa-app
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'

      - name: Build APK
        working-directory: ./twa-app
        run: |
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: 'true'

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v3
        with:
          name: sigma-first-apk
          path: |
            ./twa-app/*.apk
            ./twa-app/*.aab
          retention-days: 7
